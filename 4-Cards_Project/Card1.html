<!DOCTYPE html>
<html lang="en">

    

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Web Tool Card 1</title>
  <link rel="stylesheet" href="style1.css">
</head>
<body>

  <main class="page">
    <article class="tool-card">
      <figure class="card-image-wrapper">
        <img
          src="https://media.geeksforgeeks.org/wp-content/cdn-uploads/20221222184908/web-development1.png"
          alt="webdev.com"
          class="card-image"
        >
      </figure>

      <div class="card-content">
        <header class="card-header">
          <img
            src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQ4Odyqe9-j2nChgny5XodHUZGj-oVMD7zJ_91iCFbqUQAtrkjI2yQP-Qs8&s=10"
            alt="Freelancer Logo"
            class="tool-logo"
          >

          <h1 class="tool-title">Freelancer</h1>
        </header>

        <p class="tool-description">
          Freelance web designer & developer from Madhya Pradesh, India.
        </p>

        <ul class="tags-container" aria-label="Tool categories">
          <li class="tag-pill-a">Design</li>
          <li class="tag-pill-b">Code</li>
          <li class="tag-pill-c">Story</li>
          <li class="tag-pill-d">Create</li>
        </ul>

        <footer class="card-footer">
          <a href="#" class="visit-btn" aria-label="Visit Luke Dunsmore">
            <span><strong>Visit</strong></span>

            <svg class="arrow-icon" width="20" height="20" viewBox="0 0 24 24" aria-hidden="true" fill="none">
              <line x1="5" y1="12" x2="19" y2="12"></line>
              <polyline points="12 5 19 12 12 19"></polyline>
            </svg>
          </a>
        </footer>
      </div>
    </article>
  </main>

</body>
</html>
